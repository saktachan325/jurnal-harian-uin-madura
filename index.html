<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KuliahKu - Aplikasi Catatan Kuliah</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: 'var(--p-50)', 100: 'var(--p-100)', 200: 'var(--p-200)',
                            500: 'var(--p-500)', 600: 'var(--p-600)', 700: 'var(--p-700)',
                            800: 'var(--p-800)', 900: 'var(--p-900)',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <style>
        :root {
            --p-50: #eff6ff; --p-100: #dbeafe; --p-200: #bfdbfe;
            --p-500: #3b82f6; --p-600: #2563eb; --p-700: #1d4ed8;
            --p-800: #1e40af; --p-900: #1e3a8a;
        }
        :root[data-theme="emerald"] {
            --p-50: #ecfdf5; --p-100: #d1fae5; --p-200: #a7f3d0;
            --p-500: #10b981; --p-600: #059669; --p-700: #047857;
            --p-800: #065f46; --p-900: #064e3b;
        }
        :root[data-theme="violet"] {
            --p-50: #f5f3ff; --p-100: #ede9fe; --p-200: #ddd6fe;
            --p-500: #8b5cf6; --p-600: #7c3aed; --p-700: #6d28d9;
            --p-800: #5b21b6; --p-900: #4c1d95;
        }
        :root[data-theme="rose"] {
            --p-50: #fff1f2; --p-100: #ffe4e6; --p-200: #fecdd3;
            --p-500: #f43f5e; --p-600: #e11d48; --p-700: #be123c;
            --p-800: #9f1239; --p-900: #881337;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-scaleIn { animation: scaleIn 0.2s ease-out forwards; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="radio"]:checked + span.custom-radio-text {
            background-color: white; color: var(--p-600); box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .dark input[type="radio"]:checked + span.custom-radio-text {
            background-color: #334155; color: var(--p-500);
        }
        
        .safe-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
  
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 selection:bg-primary-200 selection:text-primary-900 pb-[90px] md:pb-0 transition-colors duration-300">

    <!-- Header -->
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-30 shadow-sm transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 text-primary-600 dark:text-primary-500 truncate mr-4">
                <i class="ph-fill ph-graduation-cap text-3xl flex-shrink-0"></i>
                <span class="text-lg md:text-xl font-extrabold tracking-tight truncate" id="app-header-title">KuliahKu</span>
            </div>
            
            <nav class="hidden md:flex space-x-1" id="desktop-nav"></nav>

            <div class="w-9 h-9 bg-gradient-to-tr from-primary-500 to-primary-400 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md flex-shrink-0 overflow-hidden" id="header-avatar">
                M
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative min-h-[80vh]" id="main-content"></main>

    <!-- Mobile Bottom Taskbar -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 w-full bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around p-3 safe-pb shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)] z-40 transition-colors duration-300" id="mobile-nav"></nav>

    <!-- MODAL MATA KULIAH -->
    <div id="modal-course" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl scale-95 transition-all duration-300 transform border border-slate-100 dark:border-slate-700" id="modal-course-content">
            <div class="bg-primary-600 dark:bg-primary-700 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modal-course-title">Tambah Mata Kuliah</h3>
                <button onclick="window.closeModal('modal-course')" class="text-primary-200 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            <form id="form-course" class="p-6 space-y-4">
                <input type="hidden" id="course-edit-id" name="id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">NAMA MATA KULIAH</label>
                    <input type="text" id="course-name" name="name" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary-500 outline-none transition-colors" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">NAMA DOSEN</label>
                    <input type="text" id="course-lecturer" name="lecturer" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary-500 outline-none transition-colors" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">HARI</label>
                        <select id="course-day" name="day" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary-500 outline-none transition-colors">
                            <option value="Senin">Senin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Kamis">Kamis</option><option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">WAKTU</label>
                        <input type="text" id="course-time" name="time" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary-500 outline-none transition-colors" placeholder="08:00 - 10:00" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">RUANGAN</label>
                    <input type="text" id="course-room" name="room" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary-500 outline-none transition-colors" required>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="window.closeModal('modal-course')" class="flex-1 px-4 py-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Batal</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-primary-600 text-white rounded-xl font-bold hover:bg-primary-700 shadow-lg shadow-primary-500/30 transition-colors">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CATATAN (DIPERLUAS & DIPERBESAR) -->
    <div id="modal-note" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4 md:p-8 opacity-0 transition-opacity duration-300 overflow-y-auto">
        <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-4xl overflow-hidden shadow-2xl scale-95 transition-transform duration-300 transform border border-slate-100 dark:border-slate-700 my-8" id="modal-note-content">
            <div class="bg-primary-600 dark:bg-primary-700 p-4 md:p-5 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2" id="modal-note-title"><i class="ph-fill ph-file-text"></i> Catatan</h3>
                <button onclick="window.closeModal('modal-note')" class="text-primary-200 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            <form id="form-note" class="p-6 md:p-8 space-y-4">
                <input type="hidden" id="note-edit-id" name="id">
                <div>
                    <input type="text" id="note-title" name="title" class="w-full text-2xl font-extrabold border-b-2 border-slate-100 dark:border-slate-700 px-2 py-3 focus:border-primary-500 outline-none bg-transparent dark:text-white transition-colors" placeholder="Judul Catatan..." required>
                </div>
                <div>
                    <textarea id="note-content" name="content" rows="18" class="w-full bg-yellow-50/50 dark:bg-slate-700/50 border border-yellow-100 dark:border-slate-600 rounded-2xl p-5 md:p-6 focus:ring-2 focus:ring-primary-300 outline-none text-slate-700 dark:text-slate-200 resize-y leading-relaxed text-base md:text-lg min-h-[400px] transition-colors" placeholder="Mulai menulis detail catatan kuliahmu di sini... (Area ini sudah diperlebar dan dipertinggi)" required></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="window.closeModal('modal-note')" class="flex-1 px-4 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Batal</button>
                    <button type="submit" class="flex-1 px-4 py-3 bg-primary-600 text-white rounded-xl font-bold hover:bg-primary-700 shadow-lg shadow-primary-500/30 transition-colors">Simpan Catatan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL TUGAS -->
    <div id="modal-assignment" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4 overflow-y-auto opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl scale-95 transition-transform duration-300 transform my-8 border border-slate-100 dark:border-slate-700" id="modal-assignment-content">
            <div class="bg-gradient-to-r from-primary-700 to-primary-500 p-5 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2" id="modal-assign-title"><i class="ph ph-list-checks text-xl"></i> Tugas Baru</h3>
                <button onclick="window.closeModal('modal-assignment')" class="text-primary-200 hover:text-white bg-white/10 p-1 rounded-full w-8 h-8 flex items-center justify-center">&times;</button>
            </div>
            <form id="form-assignment" class="p-6 space-y-5">
                <input type="hidden" id="assign-edit-id" name="id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">JUDUL TUGAS</label>
                    <input type="text" id="assign-title" name="title" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none transition-colors" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">JENIS TUGAS</label>
                        <select id="assign-type" name="type" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none transition-colors">
                            <option value="Makalah">Makalah</option> <option value="Artikel">Artikel</option> <option value="PPT">Presentasi (PPT)</option>
                            <option value="Review Jurnal">Review Jurnal</option> <option value="Projek">Projek Codding</option> <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">WAKTU TUGAS</label>
                        <input type="datetime-local" id="assign-date" name="dueDate" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none text-sm transition-colors" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">SIFAT TUGAS</label>
                    <div class="flex gap-4 bg-slate-50 dark:bg-slate-800 p-1 rounded-xl border border-slate-200 dark:border-slate-600">
                        <label class="flex-1 relative text-center cursor-pointer">
                            <input type="radio" id="assign-indiv" name="isGroup" value="false" class="peer hidden" checked onchange="window.toggleGroupMembers(false)">
                            <span class="custom-radio-text block py-2 rounded-lg text-sm font-bold text-slate-400 peer-checked:text-primary-600 transition-all">Individu</span>
                        </label>
                        <label class="flex-1 relative text-center cursor-pointer">
                            <input type="radio" id="assign-group" name="isGroup" value="true" class="peer hidden" onchange="window.toggleGroupMembers(true)">
                            <span class="custom-radio-text block py-2 rounded-lg text-sm font-bold text-slate-400 peer-checked:text-primary-600 transition-all">Kelompok</span>
                        </label>
                    </div>
                </div>

                <div id="group-members-container" class="hidden animate-fadeIn">
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">NAMA ANGGOTA KELOMPOK</label>
                    <textarea id="assign-members" name="members" rows="2" class="w-full bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none text-sm placeholder:text-slate-400 transition-colors" placeholder="Pisahkan dengan koma"></textarea>
                </div>

                <div class="flex gap-3 pt-2 mt-6">
                    <button type="button" onclick="window.closeModal('modal-assignment')" class="flex-1 px-4 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Batal</button>
                    <button type="submit" class="flex-[2] px-4 py-3 bg-primary-600 text-white rounded-xl font-bold hover:bg-primary-700 shadow-lg shadow-primary-500/30 transition-all">Simpan Tugas</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT UTAMA (UI & State) -->
    <script>
        // State Default (Offline First)
        window.state = {
            activeTab: 'dashboard',
            activeCourseId: null,
            detailTab: 'notes',
            theme: 'blue',
            darkMode: false,
            profile: {
                name: 'Mahasiswa Hebat',
                nim: '2109876543',
                university: 'Universitas Indonesia',
                major: 'Sistem Informasi',
                bio: 'Fokus belajar dan raih mimpimu!',
                avatarUrl: ''
            },
            courses: []
        };

        // Fungsi Default untuk Save (Bisa di-override oleh Firebase)
        window.saveProfileToCloud = async () => {};
        window.saveCourseToCloud = async () => {};

        // Helper Tanggal
        const hariIndo = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const getTodayName = () => hariIndo[new Date().getDay()];
        const getTomorrowName = () => hariIndo[new Date(new Date().setDate(new Date().getDate() + 1)).getDay()];
        
        window.isToday = (d) => new Date(d).toDateString() === new Date().toDateString();
        window.isTomorrow = (d) => {
            const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
            return new Date(d).toDateString() === tmrw.toDateString();
        };
        window.formatDate = (dateString, includeTime = true) => {
            if(!dateString) return '';
            const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            if(includeTime) { opts.hour = '2-digit'; opts.minute = '2-digit'; }
            return new Date(dateString).toLocaleDateString('id-ID', opts);
        };
        window.generateId = () => Date.now().toString() + Math.random().toString(36).slice(2, 7);

        // Theme Engine
        window.applyTheme = () => {
            document.documentElement.setAttribute('data-theme', window.state.theme);
            if(window.state.darkMode) { document.documentElement.classList.add('dark'); } 
            else { document.documentElement.classList.remove('dark'); }
        };
        window.changeTheme = (color) => { window.state.theme = color; window.applyTheme(); window.renderApp(); window.saveProfileToCloud(); };
        window.toggleDarkMode = () => { window.state.darkMode = !window.state.darkMode; window.applyTheme(); window.renderApp(); window.saveProfileToCloud(); };

        // Navigation
        window.navigateTo = (tab, courseId = null) => {
            window.state.activeTab = tab;
            if (courseId) { window.state.activeCourseId = courseId; window.state.detailTab = 'notes'; }
            window.renderNavUI(); window.renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.renderNavUI = () => {
            const tabs = [
                { id: 'dashboard', icon: 'ph-house', label: 'Beranda' },
                { id: 'courses', icon: 'ph-books', label: 'Kuliah' },
                { id: 'profile', icon: 'ph-user', label: 'Profil' },
                { id: 'settings', icon: 'ph-gear', label: 'Pengaturan' }
            ];
            
            const renderDesktopBtn = (t) => {
                const isAct = t.id === window.state.activeTab || (t.id === 'courses' && window.state.activeTab === 'courseDetail');
                const cls = isAct ? 'bg-primary-50 dark:bg-primary-900/40 text-primary-700 dark:text-primary-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800';
                return `<button onclick="window.navigateTo('${t.id}')" class="px-4 py-2 rounded-xl font-semibold flex items-center gap-2 transition-all ${cls}"><i class="ph ${t.icon} text-lg"></i> ${t.label}</button>`;
            };

            const renderMobileBtn = (t) => {
                const isAct = t.id === window.state.activeTab || (t.id === 'courses' && window.state.activeTab === 'courseDetail');
                const cls = isAct ? 'text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/30' : 'text-slate-400 dark:text-slate-500 hover:text-primary-500';
                return `<button onclick="window.navigateTo('${t.id}')" class="flex flex-col items-center p-2 rounded-xl w-16 transition-colors ${cls}"><i class="${isAct?'ph-fill':'ph'} ${t.icon} text-2xl mb-1"></i><span class="text-[10px] font-bold">${t.label}</span></button>`;
            };

            document.getElementById('desktop-nav').innerHTML = tabs.map(renderDesktopBtn).join('');
            document.getElementById('mobile-nav').innerHTML = tabs.map(renderMobileBtn).join('');
        };

        // UI Render Engine
        window.renderApp = () => {
            const fname = window.state.profile.name.split(' ')[0] || 'Aplikasi';
            document.getElementById('app-header-title').innerText = `Aplikasi ${fname}`;
            
            const avatarEl = document.getElementById('header-avatar');
            if(window.state.profile.avatarUrl) {
                avatarEl.innerHTML = `<img src="${window.state.profile.avatarUrl}" class="w-full h-full object-cover" onerror="this.onerror=null; this.parentNode.innerHTML='${fname.charAt(0).toUpperCase()}';">`;
            } else {
                avatarEl.innerHTML = fname.charAt(0).toUpperCase();
            }

            const mc = document.getElementById('main-content');
            let html = '';
            switch(window.state.activeTab) {
                case 'dashboard': html = renderDashboard(); break;
                case 'courses': html = renderCourses(); break;
                case 'courseDetail': html = renderCourseDetail(); break;
                case 'profile': html = renderProfile(); break;
                case 'settings': html = renderSettings(); break;
            }
            mc.innerHTML = html;
        };

        function renderDashboard() {
            let allTasks = [];
            window.state.courses.forEach(c => {
                c.assignments.forEach(a => allTasks.push({ ...a, courseName: c.name, courseId: c.id }));
            });
            allTasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            const pending = allTasks.filter(a => !a.isCompleted);
            const todayTasks = pending.filter(a => window.isToday(a.dueDate));
            const tomorrowTasks = pending.filter(a => window.isTomorrow(a.dueDate));
            const futureTasks = pending.filter(a => !window.isToday(a.dueDate) && !window.isTomorrow(a.dueDate));

            const coursesToday = window.state.courses.filter(c => c.day === getTodayName());
            const coursesTomorrow = window.state.courses.filter(c => c.day === getTomorrowName());

            let scheduleHtml = '';
            const renderCard = (c, badgeText, bCol) => {
                const badgeStyle = bCol === 'primary' ? 'bg-primary-100 text-primary-700 dark:bg-primary-900/30 dark:text-primary-400' : 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300';
                return `<div onclick="window.navigateTo('courseDetail', '${c.id}')" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-2xl flex-shrink-0 w-64 md:w-72 shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold px-2 py-1 rounded-md ${badgeStyle} uppercase tracking-wider">${badgeText}</span>
                        <i class="ph-fill ph-book-bookmark text-primary-500 text-xl"></i>
                    </div>
                    <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-1 truncate">${c.name}</h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-3 truncate"><i class="ph ph-user-circle"></i> ${c.lecturer}</p>
                    <div class="flex items-center gap-3 text-xs font-semibold text-slate-600 dark:text-slate-300">
                        <span><i class="ph ph-clock text-primary-500"></i> ${c.time}</span>
                        <span class="truncate"><i class="ph ph-map-pin text-primary-500"></i> ${c.room}</span>
                    </div>
                </div>`;
            };

            if (!coursesToday.length && !coursesTomorrow.length) {
                scheduleHtml = `<p class="text-sm text-slate-500 italic py-2">Tidak ada jadwal kuliah untuk hari ini dan besok. Bersantai sejenak! 🌴</p>`;
            } else {
                let cards = [];
                coursesToday.forEach(c => cards.push(renderCard(c, 'Hari Ini', 'primary')));

                                        <input type="text" name="university" value="${window.state.profile.university}" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none dark:text-white transition-colors" required>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase">Program Studi</label>
                                        <input type="text" name="major" value="${window.state.profile.major}" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none dark:text-white transition-colors" required>
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase">Bio / Motto</label>
                                        <textarea name="bio" rows="2" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-500 outline-none dark:text-white transition-colors">${window.state.profile.bio}</textarea>
                                    </div>
                                </div>
                                <button type="submit" class="w-full bg-slate-800 dark:bg-primary-600 hover:bg-slate-900 dark:hover:bg-primary-700 text-white font-bold py-4 rounded-xl mt-4 shadow-lg transition-all">Simpan Profil Secara Permanen</button>
                            </form>
                        </div>
                    </div>
                </div>`;
        }

        function renderSettings() {
            const themes = [
                { id: 'blue', color: 'bg-blue-500' }, { id: 'emerald', color: 'bg-emerald-500' },
                { id: 'violet', color: 'bg-violet-500' }, { id: 'rose', color: 'bg-rose-500' }
            ];

            return `
                <div class="max-w-2xl mx-auto space-y-6 animate-fadeIn pb-10">
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Pengaturan Aplikasi</h2>
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-6">
                        <div class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-600">
                            <h4 class="font-bold text-slate-800 dark:text-white mb-1">Tema Warna Utama</h4>
                            <div class="flex gap-4 mt-3">
                                ${themes.map(t => `<button onclick="window.changeTheme('${t.id}')" class="w-10 h-10 rounded-full ${t.color} flex items-center justify-center transition-transform hover:scale-110 ${window.state.theme === t.id ? 'ring-4 ring-offset-2 ring-slate-300 dark:ring-slate-600' : ''}">${window.state.theme === t.id ? '<i class="ph-bold ph-check text-white"></i>' : ''}</button>`).join('')}
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-600">
                            <div><h4 class="font-bold text-slate-800 dark:text-white flex items-center gap-2"><i class="ph-fill ph-moon"></i> Mode Gelap (Dark Mode)</h4></div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${window.state.darkMode ? 'checked' : ''} onchange="window.toggleDarkMode()">
                                <div class="w-11 h-6 bg-slate-200 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
                            </label>
                        </div>
                        <div class="pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
                            <p class="text-xs font-bold text-slate-500 mb-4 flex items-center justify-center gap-2 py-2 rounded-lg" id="cloud-status"><i class="ph-fill ph-cloud-slash text-lg"></i> Offline Mode (Menyimpan Sementara)</p>
                        </div>
                    </div>
                </div>`;
        }

        // Action Handlers
        window.toggleAssignmentStatus = (cId, aId) => {
            const course = window.state.courses.find(c => c.id === cId);
            if(course) {
                const assign = course.assignments.find(a => a.id === aId);
                if(assign) { assign.isCompleted = !assign.isCompleted; window.saveCourseToCloud(course); window.renderApp(); }
            }
        };

        window.handleUpdateProfile = (e) => {
            e.preventDefault(); const fd = new FormData(e.target);
            window.state.profile = {
                name: fd.get('name'), nim: fd.get('nim'), university: fd.get('university'),
                major: fd.get('major'), bio: fd.get('bio'), avatarUrl: fd.get('avatarUrl')
            };
            window.saveProfileToCloud(); alert('Mantap! Profil berhasil disimpan.'); window.renderApp();
        };

        // Modal Logic
        window.openModal = (id) => {
            const m = document.getElementById(id), c = document.getElementById(`${id}-content`);
            m.classList.remove('hidden'); setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); c.classList.add('scale-100'); }, 10);
        };
        window.closeModal = (id) => {
            const m = document.getElementById(id), c = document.getElementById(`${id}-content`);
            m.classList.add('opacity-0'); c.classList.remove('scale-100'); c.classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); document.getElementById(`form-${id.split('-')[1]}`).reset(); }, 300);
        };

        // Form Submit Handlers
        document.getElementById('form-course').addEventListener('submit', (e) => {
            e.preventDefault(); const fd = new FormData(e.target); const isEditId = fd.get('id');
            const cData = { id: isEditId || window.generateId(), name: fd.get('name'), lecturer: fd.get('lecturer'), day: fd.get('day'), time: fd.get('time'), room: fd.get('room') };
            if (isEditId) {
                const idx = window.state.courses.findIndex(c => c.id === isEditId);
                if(idx > -1) { window.state.courses[idx] = { ...window.state.courses[idx], ...cData }; window.saveCourseToCloud(window.state.courses[idx]); }
            } else {
                cData.notes = []; cData.assignments = []; window.state.courses.push(cData); window.saveCourseToCloud(cData);
            }
            window.closeModal('modal-course'); window.renderApp();
        });

        document.getElementById('form-note').addEventListener('submit', (e) => {
            e.preventDefault(); const fd = new FormData(e.target);
            const course = window.state.courses.find(c => c.id === window.state.activeCourseId);
            if (!course) return;
            const isEditId = fd.get('id');
            if (isEditId) {
                const nIdx = course.notes.findIndex(x => x.id === isEditId);
                if (nIdx > -1) { course.notes[nIdx].title = fd.get('title'); course.notes[nIdx].content = fd.get('content'); }
            } else {
                course.notes.unshift({ id: window.generateId(), title: fd.get('title'), content: fd.get('content'), date: new Date().toISOString() });
            }
            window.saveCourseToCloud(course); window.closeModal('modal-note'); window.renderApp();
        });

        document.getElementById('form-assignment').addEventListener('submit', (e) => {
            e.preventDefault(); const fd = new FormData(e.target);
            const course = window.state.courses.find(c => c.id === window.state.activeCourseId);
            if(!course) return;
            const isGroup = fd.get('isGroup') === 'true'; const isEditId = fd.get('id');
            const data = { title: fd.get('title'), type: fd.get('type'), isGroup: isGroup, members: isGroup ? fd.get('members') : '', dueDate: fd.get('dueDate') };
            if (isEditId) {
                const idx = course.assignments.findIndex(x => x.id === isEditId);
                if(idx > -1) { course.assignments[idx] = { ...course.assignments[idx], ...data }; }
            } else {
                data.id = window.generateId(); data.isCompleted = false; course.assignments.push(data);
            }
            course.assignments.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
            window.saveCourseToCloud(course); window.closeModal('modal-assignment'); window.renderApp();
        });

        window.openCourseModal = (courseId = null) => {
            document.getElementById('form-course').reset();
            if (courseId) {
                const c = window.state.courses.find(x => x.id === courseId);
                if(c) {
                    document.getElementById('modal-course-title').innerText = 'Edit Mata Kuliah'; document.getElementById('course-edit-id').value = c.id;
                    document.getElementById('course-name').value = c.name; document.getElementById('course-lecturer').value = c.lecturer;
                    document.getElementById('course-day').value = c.day; document.getElementById('course-time').value = c.time; document.getElementById('course-room').value = c.room;
                }
            } else { document.getElementById('modal-course-title').innerText = 'Tambah Mata Kuliah'; document.getElementById('course-edit-id').value = ''; }
            window.openModal('modal-course');
        };

        window.openNoteModal = (noteId = null) => {
            document.getElementById('form-note').reset();
            if (noteId) {
                const course = window.state.courses.find(c => c.id === window.state.activeCourseId); const n = course.notes.find(x => x.id === noteId);
                if (n) { document.getElementById('modal-note-title').innerHTML = '<i class="ph-fill ph-file-text"></i> Edit Catatan'; document.getElementById('note-edit-id').value = n.id; document.getElementById('note-title').value = n.title; document.getElementById('note-content').value = n.content; }
            } else { document.getElementById('modal-note-title').innerHTML = '<i class="ph-fill ph-file-text"></i> Buat Catatan Baru'; document.getElementById('note-edit-id').value = ''; }
            window.openModal('modal-note');
        };

        window.toggleGroupMembers = (isGroup) => { const cont = document.getElementById('group-members-container'); if(isGroup) { cont.classList.remove('hidden'); } else { cont.classList.add('hidden'); } };
        window.openAssignModal = (assignId = null) => {
            document.getElementById('form-assignment').reset(); window.toggleGroupMembers(false);
            if (assignId) {
                const course = window.state.courses.find(c => c.id === window.state.activeCourseId); const a = course.assignments.find(x => x.id === assignId);
                if (a) {
                    document.getElementById('modal-assign-title').innerHTML = '<i class="ph ph-list-checks text-xl"></i> Edit Tugas'; document.getElementById('assign-edit-id').value = a.id;
                    document.getElementById('assign-title').value = a.title; document.getElementById('assign-type').value = a.type;
                    const d = new Date(a.dueDate); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); document.getElementById('assign-date').value = d.toISOString().slice(0,16);
                    if(a.isGroup) { document.getElementById('assign-group').checked = true; window.toggleGroupMembers(true); document.getElementById('assign-members').value = a.members; } else { document.getElementById('assign-indiv').checked = true; }
                }
            } else {
                document.getElementById('modal-assign-title').innerHTML = '<i class="ph ph-list-checks text-xl"></i> Tugas Baru'; document.getElementById('assign-edit-id').value = '';
                const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); document.getElementById('assign-date').value = d.toISOString().slice(0,16);
            }
            window.openModal('modal-assignment');
        };

        // Render UI Secara Instan! (Layar tidak akan pernah putih)
        window.applyTheme();
        window.renderNavUI();
        window.renderApp();

    </script>

    <!-- SCRIPT CLOUD (Berjalan Diam-diam di Latar Belakang) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const initCloud = async () => {
            try {
                if (typeof __firebase_config === 'undefined') return;
                
                const app = initializeApp(JSON.parse(__firebase_config));
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'kuliahku-app';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;

                    // Buat fungsi save terhubung ke Cloud
                    window.saveProfileToCloud = async () => {
                        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'profileSettings'), {
                            profile: window.state.profile, settings: { theme: window.state.theme, darkMode: window.state.darkMode }
                        });
                    };
                    window.saveCourseToCloud = async (courseObj) => {
                        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'courses', courseObj.id), courseObj);
                    };

                    // Tarik Profile dari Cloud
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'profileSettings');
                    onSnapshot(profileRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            window.state.profile = data.profile || window.state.profile;
                            window.state.theme = data.settings?.theme || 'blue';
                            window.state.darkMode = data.settings?.darkMode || false;
                            window.applyTheme();
                            window.renderApp();
                        } else {
                            window.saveProfileToCloud(); // Simpan default
                        }
                    }, (e) => console.error(e));

                    // Tarik Mata Kuliah & Tugas dari Cloud
                    const coursesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'courses');
                    onSnapshot(coursesRef, (querySnap) => {
                        const loadedCourses = [];
                        querySnap.forEach((d) => loadedCourses.push(d.data()));
                        window.state.courses = loadedCourses;
                        
                        // Update status di halaman pengaturan jika sedang dibuka
                        const statusEl = document.getElementById('cloud-status');
                        if(statusEl) {
                            statusEl.innerHTML = '<i class="ph-fill ph-cloud-check text-lg"></i> Tersinkronisasi dengan Cloud (Data Aman)';
                            statusEl.className = 'text-xs font-bold text-green-600 dark:text-green-400 mb-4 flex items-center justify-center gap-2 bg-green-50 dark:bg-green-900/20 py-2 rounded-lg';
                        }
                        
                        // Hilangkan logo loading dan render UI
                        const loader = document.getElementById('global-loader');
                        if(loader) {
                            loader.classList.add('opacity-0', 'pointer-events-none');
                            setTimeout(() => loader.remove(), 300);
                        }
                        
                        window.renderApp();
                    }, (e) => console.error(e));
                });
            } catch (err) {
                console.error("Cloud Error:", err);
                const loader = document.getElementById('global-loader');
                if(loader) loader.remove();
            }
        };

        // Mulai proses cloud
        initCloud();
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
